<!-- template: CO-02-scorecard -->
<!-- data_shapes: single_metric, comparison -->
<!-- density: medium (4-6 metrics) -->

<section class="slide {{slot:slide_class}}">
  <div class="slide-inner">
    <h2 class="slide-title anim">{{slot:headline}}</h2>
    <p class="slide-subtitle anim d1">{{slot:subhead}}</p>

    <div class="two-col anim d2">
      <div class="scorecard-grade-block">
        <div class="stat-number cyan scorecard-grade">{{slot:grade}}</div>
        <div class="stat-label scorecard-grade-label">{{slot:grade_label}}</div>
      </div>
      <div class="scorecard-chart">
        <div class="comparison-bars">
          {{slot:chart_primary}}
        </div>
      </div>
    </div>

    {{#if slot:source}}
    <div class="source-list anim d3">
      {{component:source-citation slot:source}}
    </div>
    {{/if}}
  </div>
</section>
