<!-- component: comparison-row -->
<div class="bar-row">
  <span class="bar-label">{{slot:label}}</span>
  <div class="comparison-row-values">
    <span class="comparison-before">{{slot:before_value}}</span>
    <span class="comparison-arrow">→</span>
    <span class="comparison-after {{slot:color_class}}">{{slot:after_value}}</span>
  </div>
</div>
